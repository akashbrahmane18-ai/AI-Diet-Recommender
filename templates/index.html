<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Diet Assistant</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.8); }
        [data-bs-theme="dark"] { --glass: rgba(33, 37, 41, 0.8); }

        body { font-family: 'Poppins', sans-serif; transition: background 0.3s ease; }
        .hero-section { 
            background: linear-gradient(135deg, #2c3e50, #4ca1af); 
            color: white; padding: 80px 0; border-radius: 0 0 30px 30px; 
        }
        .recipe-card { 
            border: none; border-radius: 20px; transition: 0.3s; 
            background: var(--glass); backdrop-filter: blur(10px);
        }
        .recipe-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(0,0,0,0.15); }
        .instruction-box { 
            background: rgba(0,0,0,0.05); padding: 20px; 
            border-radius: 15px; border-left: 6px solid #0d6efd; 
        }
        .theme-toggle { position: fixed; top: 20px; right: 20px; z-index: 1000; }
    </style>
</head>
<body>

    <button class="btn btn-outline-light theme-toggle shadow" id="btnSwitch">🌓 Toggle Theme</button>

    <div class="hero-section text-center shadow-lg">
        <div class="container">
            <h1 class="display-3 fw-bold">🍲 AI Diet Assistant</h1>
            <p class="lead opacity-75">Precision Nutrition powered by K-Nearest Neighbors</p>
        </div>
    </div>

    <div class="container mt-n5">
        <div class="card p-4 shadow-lg mb-5 border-0 rounded-4" style="margin-top: -60px;">
            <form action="/recommend" method="POST" class="row g-3">
                <div class="col-md-5">
                    <label class="form-label fw-bold">Target Calories</label>
                    <input type="number" name="calories" class="form-control form-control-lg rounded-3" placeholder="e.g. 500" required>
                </div>
                <div class="col-md-5">
                    <label class="form-label fw-bold">Min Protein (g)</label>
                    <input type="number" name="protein" class="form-control form-control-lg rounded-3" placeholder="e.g. 30" required>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold rounded-3 shadow">Find Meals</button>
                </div>
            </form>
        </div>

        {% if recipes %}
        <div class="row">
            {% for recipe in recipes %}
            <div class="col-12 mb-5">
                <div class="card recipe-card shadow-sm p-4 border border-secondary border-opacity-10">
                    <div class="row align-items-center mb-3">
                        <div class="col-md-8">
                            <h2 class="text-capitalize fw-bold">{{ recipe.name }}</h2>
                        </div>
                        <div class="col-md-4 text-md-end">
                            <span class="badge bg-success px-3 py-2 me-2">🔥 {{ recipe.calories }} Cal</span>
                            <span class="badge bg-primary px-3 py-2">💪 {{ recipe.protein }}g Prot</span>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <h5 class="fw-bold text-primary">🛒 Ingredients</h5>
                            <p class="small text-secondary">{{ recipe.ingredients }}</p>
                        </div>
                        <div class="col-md-8">
                            <h5 class="fw-bold text-primary">👨‍🍳 Cooking Steps</h5>
                            <div class="instruction-box">
                                {{ recipe.steps }}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        {% endif %}
    </div>

    <script>
        document.getElementById('btnSwitch').addEventListener('click',()=>{
            const html = document.documentElement;
            if (html.getAttribute('data-bs-theme') == 'dark') {
                html.setAttribute('data-bs-theme','light');
            } else {
                html.setAttribute('data-bs-theme','dark');
            }
        });
    </script>
</body>
</html>
